<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chào mừng đến với góc của Duy</title>

  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/png">

  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    /* --- Cài đặt chung --- */
    :root {
      --primary-color: #ff85a2;
      --secondary-color: #ffb6c1;
      --bg-gradient: linear-gradient(135deg, #ffe6f0 0%, #e6f7ff 100%);
      --text-color: #d63384;
      --white: #ffffff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
      overflow-x: hidden;
      position: relative;
    }

    h1, h2, h3 {
      font-family: 'Patrick Hand', cursive;
      margin-bottom: 15px;
    }

    /* --- Container chính --- */
    .container {
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 30px;
      box-shadow: 0 10px 30px rgba(255, 133, 162, 0.2);
      width: 100%;
      max-width: 500px;
      z-index: 10;
      text-align: center;
      border: 2px solid #fff;
    }

    /* --- Avatar & Intro --- */
    .intro-text {
      font-size: 1.8em;
      font-weight: bold;
      margin-bottom: 25px;
      text-shadow: 2px 2px 0px #fff;
    }

    /* --- Buttons --- */
    .btn {
      display: inline-block;
      padding: 12px 25px;
      margin: 10px 5px;
      border: none;
      border-radius: 50px;
      font-size: 1.1em;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      text-decoration: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.15);
    }

    .btn:active {
      transform: scale(0.95);
    }

    /* Style riêng cho từng loại nút */
    .btn-main {
      background: linear-gradient(to right, #ff99cc, #ffccff);
      color: var(--white);
    }

    .btn-social {
      background-color: var(--primary-color);
      color: var(--white);
      width: 100%;
      max-width: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 10px auto;
    }

    .btn-social i {
      margin-right: 10px;
      font-size: 1.2em;
    }

    .btn-contact {
      background-color: #fff;
      color: var(--primary-color);
      border: 2px solid var(--secondary-color);
    }

    .btn-contact:hover {
      background-color: var(--secondary-color);
      color: white;
    }

    /* --- Social Links Section --- */
    .social-links {
      display: none; /* Mặc định ẩn */
      margin-top: 20px;
      animation: fadeIn 0.8s ease forwards;
    }

    /* --- Secret Section --- */
    .secret-section {
      margin-top: 30px;
      border-top: 2px dashed #ffb6c1;
      padding-top: 20px;
    }

    input[type="password"] {
      padding: 12px;
      border-radius: 20px;
      border: 2px solid #ffb6c1;
      outline: none;
      font-family: 'Quicksand', sans-serif;
      text-align: center;
      width: 80%;
      margin-top: 10px;
      background: rgba(255, 255, 255, 0.8);
    }

    input[type="password"]:focus {
      border-color: #ff85a2;
      box-shadow: 0 0 8px rgba(255, 133, 162, 0.4);
    }

    .error-msg {
      color: #ff4d4d;
      font-size: 0.9em;
      margin-top: 5px;
      min-height: 20px;
    }

    /* --- Floating Animals Background --- */
    .animal-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* Để không che nút bấm */
      z-index: 0;
      overflow: hidden;
    }

    .animal {
      position: absolute;
      font-size: 30px;
      animation: floatAnimal 15s infinite linear;
      opacity: 0.7;
    }

    @keyframes floatAnimal {
      0% { transform: translateX(-50px) rotate(0deg); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateX(100vw) rotate(360deg); opacity: 0; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* --- Footer Links --- */
    .footer-links {
      margin-top: 30px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }
  </style>
</head>
<body>

  <div class="animal-container">
    <div class="animal" style="top: 15%; animation-delay: 0s;">🐱</div>
    <div class="animal" style="top: 35%; animation-delay: 3s;">🐶</div>
    <div class="animal" style="top: 55%; animation-delay: 6s;">🦊</div>
    <div class="animal" style="top: 75%; animation-delay: 9s;">🐰</div>
    <div class="animal" style="top: 25%; animation-delay: 12s;">🐻</div>
  </div>

  <div class="container">
    <div class="intro-text">
      🌸 Phan Đức Duy 🌸<br>
      <span style="font-size: 0.6em; font-weight: normal; font-family: 'Patrick Hand';">Chào bạn dễ thương! Đây là góc nhỏ của mình nè~</span>
    </div>

    <button class="btn btn-main" id="openSocialBtn" onclick="toggleSocials()">
      🐾 Nhấn vào đây xem in4 🌸
    </button>

    <div class="social-links" id="socialLinks">
      <a href="https://www.facebook.com/phan.duc.duy.6" target="_blank" class="btn btn-social">
        <i class="fab fa-facebook"></i> Facebook
      </a>
      <a href="https://www.instagram.com/phan.duc.duy.6/" target="_blank" class="btn btn-social" style="background: #E1306C;">
        <i class="fab fa-instagram"></i> Instagram
      </a>
      <a href="https://www.tiktok.com/@phan.duc.duy6" target="_blank" class="btn btn-social" style="background: #000;">
        <i class="fab fa-tiktok"></i> TikTok
      </a>
      <a href="https://locket.camera/links/VH6cjVoTajabxvxa6" target="_blank" class="btn btn-social" style="background: #fea02f;">
        <i class="fas fa-link"></i> Locket
      </a>
    </div>

    <div style="margin-top: 30px;">
      <h3>Nhắn lời yêu thương cho Duy nè~</h3>
      <div style="display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;">
        <a href="https://zalo.me/0399133576" target="_blank" class="btn btn-contact">Zalo</a>
        <a href="https://m.me/phan.duc.duy.6" target="_blank" class="btn btn-contact">Messenger</a>
      </div>
    </div>

    <div class="footer-links">
        <button class="btn btn-main" onclick="playNGL()" style="background: linear-gradient(to right, #ff758c, #ff7eb3);">
            💌 Nhắn ẩn danh (NGL)
        </button>
        <a href="https://phanducduy.vercel.app" target="_blank" class="btn btn-contact" style="border-radius: 30px; font-size: 0.9em;">
            🌸 Web chữ bay
        </a>
    </div>

    <div class="secret-section">
      <h3>🔐 Cuộc sống đời thường</h3>
      <button class="btn btn-contact" id="toggleSecretBtn" onclick="showSecretInput()">Mở khóa xem ảnh</button>
      
      <div id="password-area" style="display: none; margin-top: 15px;">
        <p>Nhập mật khẩu thần thánh:</p>
        <input type="password" id="passwordInput" placeholder="Pass là gì ta?">
        <div class="error-msg" id="error-message"></div>
        <button class="btn btn-main" onclick="checkPassword()" style="margin-top: 10px; padding: 8px 20px;">Xác nhận</button>
      </div>

      <div id="secret-link" style="display: none; margin-top: 20px;">
        <p>🎁 Quà cho bạn nè:</p>
        <a href="https://drive.google.com/your-secret-link" target="_blank" class="btn btn-main">
            💖 Xem Album Bí Mật 💖
        </a>
      </div>
    </div>

  </div> <audio id="clickSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_a140b836b4.mp3?filename=correct-2-46134.mp3" preload="auto"></audio>

  <script>
    // 1. Hàm hiện danh sách social
    function toggleSocials() {
      const links = document.getElementById("socialLinks");
      const btn = document.getElementById("openSocialBtn");
      
      if (links.style.display === "block") {
        links.style.display = "none";
        btn.innerHTML = "🐾 Nhấn vào đây xem in4 🌸";
      } else {
        links.style.display = "block";
        btn.style.display = "none"; // Ẩn nút sau khi bấm (hoặc xóa dòng này nếu muốn nút vẫn hiện)
      }
    }

    // 2. Hàm xử lý NGL + Âm thanh
    function playNGL() {
      const sound = document.getElementById("clickSound");
      sound.volume = 0.5;
      sound.play().catch(e => console.log("Audio play failed")); 
      setTimeout(() => {
        window.open("https://ngl.link/phan.duc.duy.6", "_blank");
      }, 300);
    }

    // 3. Hàm xử lý mật khẩu
    function showSecretInput() {
      document.getElementById("toggleSecretBtn").style.display = "none";
      document.getElementById("password-area").style.display = "block";
    }

    function checkPassword() {
      const password = document.getElementById("passwordInput").value;
      const correctPassword = "Phanducduy6."; // Pass của bạn
      const errorMsg = document.getElementById("error-message");

      if (password === correctPassword) {
        document.getElementById("secret-link").style.display = "block";
        document.getElementById("password-area").style.display = "none";
        errorMsg.textContent = "";
      } else {
        errorMsg.textContent = "Sai mật khẩu rồi nha! 😝";
        // Hiệu ứng rung nhẹ input (tùy chọn)
        const input = document.getElementById("passwordInput");
        input.style.borderColor = "red";
        setTimeout(() => input.style.borderColor = "#ffb6c1", 500);
      }
    }
  </script>

</body>
