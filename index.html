<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chào mừng bạn yêu!</title>

  <!-- Icon trái tim cho tab trình duyệt -->
  <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/833/833472.png" type="image/png">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Comic Sans MS', cursive, sans-serif;
      background: linear-gradient(to right, #ffe6f0, #e6f7ff);
      text-align: center;
      padding: 40px 10px;
      overflow: hidden;
      color: #ff69b4;
      font-size: 18px;
    }

    .intro-text {
      font-size: 2em;
      margin-bottom: 30px;
      font-weight: bold;
      text-shadow: 1px 1px 2px #fff;
    }

    .welcome-btn {
      font-size: 1.2em;
      padding: 14px 28px;
      background: linear-gradient(to right, #ff99cc, #ffccff);
      color: white;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
      transition: all 0.3s ease;
      z-index: 10;
      position: relative;
    }

    .welcome-btn:hover {
      background: linear-gradient(to right, #ff66b2, #ffb3e6);
      transform: scale(1.05);
    }

    .social-links {
      display: none;
      margin-top: 40px;
      animation: fadeIn 1s ease forwards;
    }

    .social-links a {
      display: inline-block;
      margin: 10px;
      padding: 12px 24px;
      text-decoration: none;
      color: white;
      background-color: #ff85a2;
      border-radius: 20px;
      transition: background-color 0.3s, transform 0.3s;
      font-weight: bold;
      font-size: 1.1em;
    }

    .social-links a i {
      margin-right: 8px;
      font-size: 1.2em;
      vertical-align: middle;
    }

    .social-links a:hover {
      background-color: #ff4d88;
      transform: scale(1.1);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .animal {
      position: absolute;
      font-size: 24px;
      animation: float 10s infinite linear;
    }

    @keyframes float {
      0% {
        transform: translateX(-100px) translateY(0);
        opacity: 0;
      }
      50% {
        opacity: 1;
      }
      100% {
        transform: translateX(110vw) translateY(-30px);
        opacity: 0;
      }
    }

    @media (max-width: 480px) {
      .intro-text {
        font-size: 1.5em;
      }

      .welcome-btn {
        font-size: 1em;
        padding: 12px 20px;
      }

      .social-links a {
        font-size: 1em;
        padding: 10px 18px;
      }
    }
  </style>
</head>
<body>

  <div class="intro-text">🌸 Phan Đức Duy Xin chào bạn dễ thương! Đây là góc nhỏ xinh của mình nè~ 🌸</div>

  <button class="welcome-btn" onclick="showSocialLinks()">🐾 Nhấn vào đây để được mình yêu thương nha!</button>

  <div class="social-links" id="socialLinks">
    <a href="https://www.facebook.com/phanducduy206" target="_blank"><i class="fab fa-facebook"></i>Facebook 1</a>
    <a href="https://www.facebook.com/phanducduy26" target="_blank"><i class="fab fa-facebook"></i>Facebook 2</a>
    <a href="https://www.facebook.com/phan.duc.duy.6" target="_blank"><i class="fab fa-facebook"></i>Facebook 3</a>
    <a href="https://www.instagram.com/phan.duc.duy.6/" target="_blank"><i class="fab fa-instagram"></i>Instagram</a>
    <a href="https://www.tiktok.com/@phan.duc.duy6" target="_blank"><i class="fab fa-tiktok"></i>TikTok</a>
    <a href="https://locket.camera/links/VH6cjVoTajabxvxa6" target="_blank"><i class="fas fa-link"></i>Locket</a>
  </div>

  <!-- Các con vật chạy xung quanh -->
  <div class="animal" style="top: 20%; left: -50px;">🐱</div>
  <div class="animal" style="top: 40%; left: -100px; animation-delay: 2s;">🐶</div>
  <div class="animal" style="top: 60%; left: -80px; animation-delay: 4s;">🦊</div>
  <div class="animal" style="top: 30%; left: -60px; animation-delay: 6s;">🐰</div>
  <div class="animal" style="top: 70%; left: -70px; animation-delay: 8s;">🐻</div>

  <script>
    function showSocialLinks() {
      const links = document.getElementById("socialLinks");
      links.style.display = "block";
      document.querySelector(".welcome-btn").style.display = "none";
    }
  </script>

</body>
  <!-- Zalo & Facebook -->
  <div class="section">
    <h3>📱 Nhắn tin trực tiếp cho Duy</h3>
    <a class="chat-link zalo" href="https://zalo.me/0399133576" target="_blank">Nhắn qua Zalo</a>
    <a class="chat-link" href="https://www.facebook.com/phan.duc.duy.6" target="_blank">Nhắn qua Facebook</a>
  </div>

  <!-- Sổ lưu bút mini -->
  <div class="section">
    <h3>📖 Gửi lời nhắn tại đây</h3>
    <input type="text" id="quickName" placeholder="Tên bạn"><br>
    <textarea id="quickMsg" placeholder="Lời nhắn của bạn"></textarea><br>
    <button onclick="submitQuickMessage()">Gửi 💖</button>
    <div id="quickBoard" style="margin-top: 20px; color: #ff66a3; font-weight: bold;"></div>
  </div>

  <!-- Script hiệu ứng tim rơi & xử lý mini chat -->
  <script>
    function submitQuickMessage() {
      const name = document.getElementById("quickName").value.trim();
      const msg = document.getElementById("quickMsg").value.trim();
      const board = document.getElementById("quickBoard");
      if (!name || !msg) {
        alert("Bạn chưa nhập tên hoặc lời nhắn kìa~ 😢");
        return;
      }
      board.innerHTML = `📬 Có lời nhắn mới từ <b>${name}</b>:<br><i>"${msg}"</i>`;
    }

    function createHeart() {
      const heart = document.createElement('div');
      heart.className = 'heart';
      heart.style.left = Math.random() * window.innerWidth + 'px';
      heart.style.top = window.innerHeight + 'px';
      heart.style.animationDuration = 4 + Math.random() * 2 + 's';
      document.body.appendChild(heart);
      setTimeout(() => document.body.removeChild(heart), 6000);
    }
    setInterval(createHeart, 300);
  </script>

</body>
</html>
<!DOCTYPE html>
<html lang="vi">
<<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Gửi tin nhắn Telegram</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 30px;
    }
    form {
      display: flex;
      flex-direction: column;
      width: 300px;
    }
    input, button {
      padding: 10px;
      margin: 5px 0;
    }
    #result {
      margin-top: 10px;
      color: green;
    }
  </style>
</head>
<body>

  <h2>Chat với admin (Telegram)</h2>
  <form id="chatForm">
    <input type="text" id="message" placeholder="Nhập tin nhắn..." required />
    <button type="submit">Gửi</button>
  </form>

  <div id="result"></div>

  <script>
    const TOKEN = "7872533277:AAHVPa1hBQ0qrLIO_9seiQEMlIccbdj-CFk"; // Token bot của bạn
    const CHAT_ID = "123456789"; // Thay bằng chat_id bạn lấy được

    document.getElementById("chatForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const message = document.getElementById("message").value;
      const url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;

      fetch(url, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          chat_id: CHAT_ID,
          text: message
        })
      })
      .then(response => response.json())
      .then(data => {
        document.getElementById("result").textContent = "Đã gửi tin nhắn!";
        document.getElementById("message").value = "";
      })
      .catch(err => {
        document.getElementById("result").textContent = "Gửi thất bại! Lỗi: " + err.message;
      });
    });
  </script>

</body>
</html>
