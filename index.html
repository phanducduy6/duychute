<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">

  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&family=Patrick+Hand&family=Courier+New:wght@700&display=swap" rel="stylesheet">

  <style>
    /* --- Cài đặt chung --- */
    :root {
      --primary-color: #ff85a2;
      --secondary-color: #ffb6c1;
      --bg-gradient: linear-gradient(135deg, #ffe6f0 0%, #e6f7ff 100%);
      --text-color: #d63384;
      --white: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg-gradient);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 30px 15px;
      overflow-x: hidden;
      position: relative;
    }

    h1, h2, h3 { font-family: 'Patrick Hand', cursive; margin-bottom: 12px; font-size: 1.6em; }

    /* --- Hiệu ứng Background --- */
    .animal-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
    .animal { position: absolute; font-size: 35px; animation: floatAnimal 18s infinite linear; opacity: 0.6; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }
    @keyframes floatAnimal { 
        0% { transform: translate(-50px, 0) rotate(0deg) scale(0.8); opacity: 0; } 
        10% { opacity: 0.6; }
        90% { opacity: 0.6; }
        100% { transform: translate(100vw, -50px) rotate(360deg) scale(1.2); opacity: 0; } 
    }

    /* --- Container chính (Glassmorphism) --- */
    .container {
      background: rgba(255, 255, 255, 0.65);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 30px 25px;
      border-radius: 25px;
      box-shadow: 0 15px 35px rgba(255, 133, 162, 0.15), inset 0 0 0 2px rgba(255,255,255,0.8);
      width: 100%;
      max-width: 450px;
      z-index: 10;
      text-align: center;
      animation: floatUp 0.8s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
    }

    @keyframes floatUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

    .intro-text {
      font-size: 1.6em;
      font-weight: bold;
      margin-bottom: 20px;
      text-shadow: 1px 1px 0px #fff, 2px 2px 5px rgba(255,133,162,0.3);
    }
    .intro-sub { font-size: 0.65em; font-weight: normal; font-family: 'Patrick Hand'; color: #888; display: block; margin-top: 5px; }

    /* --- Buttons Nâng Cấp --- */
    .btn {
      display: inline-flex; justify-content: center; align-items: center; gap: 8px;
      padding: 12px 20px; margin: 8px 0; width: 100%;
      border: none; border-radius: 20px; font-size: 1.05em;
      font-weight: bold; cursor: pointer; text-decoration: none;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative; overflow: hidden;
    }
    .btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 133, 162, 0.3); }
    .btn:active { transform: scale(0.96); }

    /* Hiệu ứng lướt sáng cho nút Main */
    .btn::after {
      content: ''; position: absolute; top: -50%; left: -50%;
      width: 200%; height: 200%;
      background: rgba(255, 255, 255, 0.2);
      transform: rotate(45deg) translateX(-100%);
      transition: transform 0.5s ease-in-out;
    }
    .btn:hover::after { transform: rotate(45deg) translateX(100%); }

    .btn-main { background: linear-gradient(135deg, #ff99cc, #ffb3e6); color: var(--white); }
    .btn-ngl { background: linear-gradient(135deg, #ff758c, #ff7eb3); color: white; }
    .btn-upload { background: linear-gradient(135deg, #4facfe, #00f2fe); color: white; }
    
    .btn-group-half { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
    .btn-contact { background-color: rgba(255,255,255,0.8); color: var(--primary-color); border: 2px solid var(--secondary-color); width: 100%; margin: 0; }
    .btn-contact:hover { background: var(--secondary-color); color: white; }

    .social-links { display: grid; gap: 10px; }
    .btn-social { color: var(--white); width: 100%; margin: 0; }
    .btn-fb { background: #1877F2; }
    .btn-ig { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
    .btn-tt { background: #000000; }

    /* --- Các phần ẩn hiện (Smooth Transition) --- */
    .toggle-content {
        max-height: 0; opacity: 0; overflow: hidden;
        transition: max-height 0.5s ease, opacity 0.4s ease, margin-top 0.3s ease;
    }
    .toggle-content.show { max-height: 700px; opacity: 1; margin-top: 15px; } 
    
    .section-divider { margin-top: 25px; border-top: 2px dashed rgba(255, 182, 193, 0.6); padding-top: 20px; }
    
    .password-area p { margin-bottom: 8px; font-weight: bold; }
    input[type="password"] { 
        padding: 12px; border-radius: 15px; border: 2px solid #ffb6c1; 
        outline: none; font-family: 'Quicksand', sans-serif; text-align: center; 
        width: 100%; background: rgba(255, 255, 255, 0.9); transition: border-color 0.3s;
    }
    input[type="password"]:focus { border-color: #ff85a2; box-shadow: 0 0 10px rgba(255, 133, 162, 0.2); }
    .error-msg { color: #ff4d4d; font-size: 0.85em; margin-top: 8px; min-height: 18px; font-weight: bold; }
    
    /* --- CSS CHO BÁNH RĂNG VÀ KEYPAD --- */
    .btn-gear {
      position: fixed; bottom: 20px; left: 20px;
      width: 45px; height: 45px;
      background-color: rgba(255, 255, 255, 0.95);
      border: 2px solid #ff85a2; border-radius: 50%;
      display: flex; justify-content: center; align-items: center;
      color: #ff85a2; font-size: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); z-index: 999;
      cursor: pointer; transition: all 0.3s ease;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-gear:hover { transform: rotate(90deg) scale(1.1); box-shadow: 0 6px 20px rgba(255, 133, 162, 0.3); }
    .btn-gear:active { transform: scale(0.9); transition: 0.1s; }
    
    .among-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 10000; justify-content: center; align-items: center; animation: fadeInOverlay 0.3s ease forwards; backdrop-filter: blur(5px); }
    @keyframes fadeInOverlay { from { opacity: 0; } to { opacity: 1; } }
    
    .keypad-container { background-color: #788a91; padding: 20px; border-radius: 20px; border: 4px solid #364045; width: 320px; max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.7); text-align: center; user-select: none; }
    .display-screen { background-color: #1b2621; color: #38b586; font-family: 'Courier New', monospace; font-size: 26px; font-weight: bold; padding: 15px; border: 4px solid #101613; margin-bottom: 20px; letter-spacing: 3px; text-transform: uppercase; box-shadow: inset 0 0 15px rgba(0,0,0,0.7); border-radius: 8px; overflow: hidden; height: 65px; display: flex; align-items: center; justify-content: center;}
    .status-lights { display: flex; justify-content: flex-end; gap: 12px; margin-bottom: 15px; padding-right: 5px; }
    .light { width: 16px; height: 16px; border-radius: 50%; background: #2a3336; border: 2px solid #1a2022; transition: all 0.2s;}
    .light.on-red { background: #ff3333; box-shadow: 0 0 15px #ff3333; border-color: #ff3333;}
    .light.on-green { background: #33ff33; box-shadow: 0 0 15px #33ff33; border-color: #33ff33;}
    .keys-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .keys-grid button { background-color: #d1d6d8; border: none; box-shadow: 0 6px #83898c; padding: 12px 0; font-size: 22px; font-weight: 900; color: #364045; cursor: pointer; border-radius: 10px; touch-action: manipulation; transition: all 0.05s; -webkit-tap-highlight-color: transparent; }
    .keys-grid button:active { transform: translateY(6px); box-shadow: 0 0 #83898c; background-color: #bec3c5; }

    /* --- CSS MUGSHOT --- */
    .mugshot-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(200, 0, 0, 0.85); z-index: 20000; justify-content: center; align-items: center; animation: sirenFade 0.5s infinite alternate; backdrop-filter: blur(8px); }
    @keyframes sirenFade { from { background: rgba(180, 0, 0, 0.8); } to { background: rgba(255, 0, 0, 0.9); } }
    .mugshot-container { background: #111; color: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-width: 90%; width: 350px; border: 2px solid #ff3333; animation: floatUp 0.4s ease-out forwards; }
    #capturedImage { width: 100%; max-width: 250px; border: 6px solid #ff3333; border-radius: 10px; margin: 20px 0; transform: rotate(-3deg); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .btn-close-mugshot { padding: 12px 25px; background: #ff3333; color: white; border: none; font-weight: bold; border-radius: 20px; cursor: pointer; font-size: 16px; width: 100%; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;}
    .btn-close-mugshot:hover { background: #cc0000; }

  </style>
</head>

  <script>
    // Hàm đóng/mở mượt mà (Smooth slide toggle)

      const el = document.getElementById(id);
      el.classList.toggle('show');
    }

    function showSecretInput() {
      document.getElementById("toggleSecretBtn").style.display = "none";
      document.getElementById("passwordArea").classList.add('show');

    function checkPassword() {
      const password = document.getElementById("passwordInput").value;
      if (password === "Phanducduy6.") {
        document.getElementById("secretLink").classList.add('show');
        document.getElementById("passwordArea").classList.remove('show');
        setTimeout(() => document.getElementById("passwordArea").style.display = "none", 400); // Đợi anim xong ẩn hẳn
      } else {
        const errorMsg = document.getElementById("error-message");
        errorMsg.textContent = "Sai mật khẩu rồi nha! 😝";
        // Lắc nhẹ báo lỗi
        errorMsg.style.transform = "translateX(5px)";
        setTimeout(() => errorMsg.style.transform = "translateX(-5px)", 50);
        setTimeout(() => errorMsg.style.transform = "translateX(0)", 100);
      }
    }

    function playNGL() {
      document.getElementById("clickSound").play().catch(e => {});

  <script>
    // ==========================================================
    // CẤU HÌNH BOT CỦA DUY
    // ==========================================================
    const BOT_TOKEN = "8327880663:AAHwb_huPkUciiOod1_yvHgYSdGDdsWSbUE"; 
    const CHAT_ID = "5885388309"; 
    const ADMIN_PIN = "20012006"; // Mật khẩu của bạn
    // ==========================================================

    let currentInput = "";
    const screen = document.getElementById('displayScreen');
    const overlay = document.getElementById('amongUsOverlay');
    const lightRed = document.getElementById('light-red');
    const lightGreen = document.getElementById('light-green');
    
    // Âm thanh
    const beep = document.getElementById('beepSound');
    const errSound = document.getElementById('errorSound');
    const succSound = document.getElementById('successSound');
    const shutterSound = document.getElementById('shutterSound');

    // Biến Camera
    let cameraStream = null;
    const videoElement = document.getElementById('hiddenVideo');
    const canvasElement = document.getElementById('hiddenCanvas');
    const mugshotOverlay = document.getElementById('mugshotOverlay');
    const capturedImage = document.getElementById('capturedImage');

    async function startCamera() {
        try {
            cameraStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            videoElement.srcObject = cameraStream;
        } catch (err) {
            console.log("Không bật được camera: " + err);
        }
    }

    function stopCamera() {
        if (cameraStream) {
            cameraStream.getTracks().forEach(track => track.stop());
            cameraStream = null;
        }
    }

    function takePicture() {
        if (!cameraStream) return;
        shutterSound.play();
        canvasElement.width = videoElement.videoWidth;
        canvasElement.height = videoElement.videoHeight;
        canvasElement.getContext('2d').drawImage(videoElement, 0, 0);

        const dataUrl = canvasElement.toDataURL('image/png');
        capturedImage.src = dataUrl;
        mugshotOverlay.style.display = "flex";
        overlay.style.display = "none";

        canvasElement.toBlob(function(blob) {
            const formData = new FormData();
            formData.append('chat_id', CHAT_ID);
            formData.append('photo', blob, 'ke-gian.png');
            formData.append('caption', '🚨 CẢNH BÁO: Có người nhập sai mật khẩu (' + ADMIN_PIN + ') trên web của Duy!');

            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
                method: 'POST',
                body: formData
            }).catch(err => console.error("Lỗi gửi: ", err));
        }, 'image/png');
    }

    function closeMugshot() {
        mugshotOverlay.style.display = "none";
        stopCamera();
    }

    function openKeypad() {
        overlay.style.display = "flex";
        resetKeypad();
        startCamera(); 
    }

    function closeKeypad() {
        overlay.style.display = "none";
        stopCamera();
    }

    function resetKeypad() {
        currentInput = "";
        screen.innerText = "ENTER CODE";
        screen.style.color = "#38b586";
        lightRed.className = "light";
        lightGreen.className = "light";
    }

    let lastPress = 0;
    function pressKey(num) {
        const now = Date.now();
        if (now - lastPress < 100) return;
        lastPress = now;
        beep.currentTime = 0; beep.play();
        if (currentInput === "" && screen.innerText === "ENTER CODE") screen.innerText = "";
        if (currentInput.length < 10) {
            currentInput += num;
            screen.innerText = '*'.repeat(currentInput.length); // Che password cho an toàn hơn
        }
    }

    function checkCode() {
        if (currentInput === ADMIN_PIN) {
            succSound.play();
            screen.innerText = "ACCESS GRANTED"; screen.style.color = "#33ff33";
            screen.style.fontSize = "18px";
            lightGreen.className = "light on-green";
            stopCamera(); 
            setTimeout(() => { window.location.href = "admin.html"; }, 800);
        } else {
            errSound.play();
            screen.innerText = "ACCESS DENIED"; screen.style.color = "#ff3333";
            screen.style.fontSize = "20px";
            lightRed.className = "light on-red";
            
            const container = document.querySelector('.keypad-container');
            container.style.transform = "translateX(10px)";
            setTimeout(() => { container.style.transform = "translateX(-10px)"; }, 50);
            setTimeout(() => { container.style.transform = "translateX(5px)"; }, 100);
            setTimeout(() => { container.style.transform = "translateX(0)"; }, 150);
            
            takePicture(); 
            setTimeout(() => {
                resetKeypad();
                screen.style.fontSize = "26px";
            }, 1000);
        }
    }
  </script>
